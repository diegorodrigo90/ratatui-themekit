pre-commit:
  commands:
    validate:
      interactive: true
      run: cargo fmt --check && cargo clippy --all-targets -- -D warnings && cargo test --all-targets

commit-msg:
  commands:
    format:
      run: |
        msg=$(cat {1})
        if ! echo "$msg" | grep -qE '^(feat|fix|refactor|test|docs|chore|ci|perf|style)(\(.+\))?: .+'; then
          echo "Commit message must follow conventional format: type(scope): description"
          exit 1
        fi

pre-push:
  commands:
    validate:
      interactive: true
      run: ./scripts/validate.sh --mode hook
