name: Release Assets

# Runs on release-plz PRs to update version strings and regenerate screenshots.
# This ensures the tag (created after merge) points to a commit with
# correct version references and up-to-date images.
on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

# Required status check — runs on all PRs but only does work on release-plz PRs.
# Non-release PRs pass immediately (the job's `if` condition skips all steps).

permissions:
  contents: write
  pull-requests: write

jobs:
  update-assets:
    name: Update versions + screenshots
    if: startsWith(github.head_ref, 'release-plz-') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      PR_BRANCH: ${{ github.head_ref }}
    steps:
      - uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde # v2.9.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build showcase (release mode for screenshots)
        run: cargo build --example showcase --release

      - name: Install VHS + dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify VHS
        run: vhs --version

      - name: Generate screenshots + GIF
        env:
          THEMEKIT_GIF: "1"
        run: ./scripts/generate-screenshots.sh

      - name: Commit if changes exist
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes for v$NEW_VERSION"
          else
            git add -A
            git commit -m "chore: update assets for v$NEW_VERSION"
            git push
          fi
