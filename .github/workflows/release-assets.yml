name: Release Assets

# Validates that the showcase builds on release PRs.
# Actual asset generation happens in release-plz.yml after merge.
on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

# Required status check — runs on all PRs but only does work on release-plz PRs.
# Non-release PRs pass immediately (the job's `if` condition skips all steps).

permissions:
  contents: read

jobs:
  update-assets:
    name: Update versions + screenshots
    if: startsWith(github.head_ref, 'release-plz-') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Verify showcase builds
        run: cargo build --example showcase --release
