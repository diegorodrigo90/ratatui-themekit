name: Release-plz

on:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Configure git credentials
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com" > ~/.git-credentials
      - name: Create/update release PR
        uses: release-plz/action@476794ede164c5137bfc3a1dc6ed3675275690f9 # v0.5.99
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  # Single job: generate assets → commit → tag → GitHub Release.
  # Runs on every push to main. On non-release pushes, release-plz
  # detects no unreleased version and does nothing (idempotent).
  release:
    name: Assets + Tag + Release
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # 1. Build showcase binary
      - name: Build showcase
        run: cargo build --example showcase --release

      # 2. Install VHS + generate screenshots/GIF
      - name: Install VHS + dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate screenshots + GIF
        env:
          THEMEKIT_GIF: "1"
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          ./scripts/generate-screenshots.sh

      # 3. Commit assets if changed (before tagging)
      - name: Commit assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No asset changes"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            git add assets/
            git commit -m "chore: update assets for v$VERSION"
            git push
          fi

      # 4. Tag + GitHub Release (no publish — publish.yml handles that)
      - name: Configure git credentials
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com" > ~/.git-credentials
      - name: Create tag + GitHub Release
        uses: release-plz/action@476794ede164c5137bfc3a1dc6ed3675275690f9 # v0.5.99
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
